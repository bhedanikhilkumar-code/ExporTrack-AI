<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f2137"/>
      <stop offset="55%"  stop-color="#112c45"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#99f6e4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounding">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounding)">
    <!-- Rounded square background -->
    <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

    <!-- Top-right teal shimmer blob -->
    <circle cx="464" cy="48" r="144" fill="#14b8a6" opacity="0.18"/>

    <!-- "E" letter -->
    <text
      x="80"
      y="336"
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-weight="900"
      font-size="240"
      letter-spacing="-8"
      fill="url(#letterGrad)"
      filter="url(#glow)"
    >E</text>

    <!-- "A" letter -->
    <text
      x="248"
      y="336"
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-weight="900"
      font-size="240"
      letter-spacing="-8"
      fill="#0d9488"
      filter="url(#glow)"
    >A</text>

    <!-- Teal underline accent -->
    <rect x="80" y="368" width="352" height="20" rx="10" fill="#0d9488" opacity="0.8"/>

    <!-- Tiny cargo ship silhouette at bottom -->
    <!-- Hull -->
    <rect x="80" y="416" width="272" height="32" rx="16" fill="#0d9488" opacity="0.55"/>
    <!-- Deck cabin -->
    <rect x="112" y="392" width="80" height="32" rx="8" fill="#0d9488" opacity="0.45"/>
    <!-- Mast -->
    <rect x="148" y="352" width="12" height="48" rx="6" fill="#14b8a6" opacity="0.4"/>
    <!-- Waves -->
    <path d="M 64 456 Q 96 440 128 456 Q 160 472 192 456 Q 224 440 256 456 Q 288 472 320 456 Q 352 440 384 456"
          stroke="#14b8a6" stroke-width="9.6" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>
</svg>
