<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f2137"/>
      <stop offset="55%"  stop-color="#112c45"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#99f6e4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Top-right teal shimmer blob -->
  <circle cx="58" cy="6" r="18" fill="#14b8a6" opacity="0.18"/>

  <!-- "E" letter -->
  <text
    x="10"
    y="42"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="30"
    letter-spacing="-1"
    fill="url(#letterGrad)"
    filter="url(#glow)"
  >E</text>

  <!-- "A" letter -->
  <text
    x="31"
    y="42"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="30"
    letter-spacing="-1"
    fill="#0d9488"
    filter="url(#glow)"
  >A</text>

  <!-- Teal underline accent -->
  <rect x="10" y="46" width="44" height="2.5" rx="1.25" fill="#0d9488" opacity="0.8"/>

  <!-- Tiny cargo ship silhouette at bottom -->
  <!-- Hull -->
  <rect x="10" y="52" width="34" height="4" rx="2" fill="#0d9488" opacity="0.55"/>
  <!-- Deck cabin -->
  <rect x="14" y="49" width="10" height="4" rx="1" fill="#0d9488" opacity="0.45"/>
  <!-- Mast -->
  <rect x="18.5" y="44" width="1.5" height="6" rx="0.75" fill="#14b8a6" opacity="0.4"/>
  <!-- Waves -->
  <path d="M8 57 Q12 55 16 57 Q20 59 24 57 Q28 55 32 57 Q36 59 40 57 Q44 55 48 57"
        stroke="#14b8a6" stroke-width="1.2" fill="none" opacity="0.4" stroke-linecap="round"/>
</svg>
